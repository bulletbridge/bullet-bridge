<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bullet Bridge</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body class="popup">
    <header class="topbar">
      <div class="brand">
        <img src="../icons/icon.svg" alt="" width="28" height="28">
        <h1>Bullet Bridge</h1>
      </div>
      <div class="topbar-actions">
        <button id="openWindowButton" class="icon-button" type="button" title="Keep open in a window" aria-label="Keep open in a window">
          <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
            <rect x="3" y="5" width="16" height="16" rx="2"></rect>
            <path d="M15 3h6v6"></path>
            <path d="m13 11 8-8"></path>
          </svg>
        </button>
        <button id="optionsButton" class="icon-button" type="button" title="Options" aria-label="Options">
          <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 12h.01"></path>
            <path d="M19 12h.01"></path>
            <path d="M5 12h.01"></path>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section id="setupPanel" class="panel hidden">
        <div class="setup-copy">
          <h2>Connect Pushbullet</h2>
          <p>Sign in to send and receive pushes, files, links, and notifications.</p>
        </div>
        <div class="setup-actions">
          <button id="setupSignInButton" class="primary" type="button">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M15 3h4a2 2 0 0 1 2 2v4"></path>
              <path d="M10 14 21 3"></path>
              <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
            </svg>
            <span>Sign In</span>
          </button>
          <button id="setupButton" class="secondary" type="button">
            <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M4 7h10"></path>
              <path d="M18 7h2"></path>
              <path d="M14 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path>
              <path d="M4 17h2"></path>
              <path d="M10 17h10"></path>
              <path d="M6 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"></path>
            </svg>
            <span>Settings</span>
          </button>
        </div>
        <p id="setupHint" class="setup-hint"></p>
      </section>

      <section id="appPanel" class="hidden">
        <div class="view-tabs" role="tablist" aria-label="Bullet Bridge views">
          <button id="pushesTab" class="view-tab active" type="button" role="tab" aria-selected="true" aria-controls="pushesView">Pushes</button>
          <button id="notificationsTab" class="view-tab" type="button" role="tab" aria-selected="false" aria-controls="notificationsView">Notifications</button>
        </div>

        <section id="pushesView" class="stream-shell">
          <aside class="stream-sidebar" aria-label="Push devices">
            <div class="panel-heading">
              <h2>Devices</h2>
            </div>
            <div id="streamList" class="stream-list" aria-live="polite"></div>
          </aside>

          <section class="stream-main">
            <div class="stream-heading">
              <div class="stream-title-block">
                <h2 id="streamTitle">All devices</h2>
                <p id="streamMeta">Recent pushes</p>
              </div>
              <div class="push-search">
                <label class="search-label" for="pushSearchInput">Search loaded pushes</label>
                <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="m21 21-4.35-4.35"></path>
                  <circle cx="11" cy="11" r="7"></circle>
                </svg>
                <input id="pushSearchInput" type="search" autocomplete="off" spellcheck="false" placeholder="Search loaded pushes" aria-label="Search loaded pushes">
                <button id="clearSearchButton" class="search-clear hidden" type="button" title="Clear search" aria-label="Clear search">
                  <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M18 6 6 18"></path>
                    <path d="M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
              <button id="refreshInboxButton" class="icon-button stream-refresh" type="button" title="Refresh pushes" aria-label="Refresh pushes">
                <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                  <path d="M3 21v-5h5"></path>
                  <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                  <path d="M16 8h5V3"></path>
                </svg>
              </button>
            </div>
            <div id="pushList" class="push-list" aria-live="polite"></div>

            <form id="sendForm" class="composer">
              <input id="deviceSelect" class="hidden" name="deviceSelect" type="hidden" value="">
              <div class="composer-input-row">
                <label class="message-field" for="bodyInput">
                  <span>Message</span>
                  <textarea id="bodyInput" name="body" rows="1" maxlength="2000" placeholder="Message"></textarea>
                </label>
                <button id="useTabButton" class="icon-button composer-action" type="button" title="Use current tab" aria-label="Use current tab">
                  <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                  </svg>
                </button>
                <div class="file-picker">
                  <button id="fileChooseButton" class="icon-button composer-action" type="button" title="Attach file" aria-label="Attach file">
                    <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                      <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-8.98 8.98a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                  </button>
                  <span id="fileNameText"></span>
                </div>
                <button id="sendButton" class="primary icon-button composer-action send-button" type="submit" title="Send" aria-label="Send">
                  <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24">
                    <path d="m22 2-7 20-4-9-9-4Z"></path>
                    <path d="M22 2 11 13"></path>
                  </svg>
                </button>
              </div>
              <input id="fileInput" class="hidden-file-input" name="file" type="file" title="Choose file to attach" aria-label="Choose file to attach">

              <div id="uploadProgress" class="upload-progress hidden" aria-live="polite">
                <div class="progress-track" aria-hidden="true">
                  <div id="uploadProgressBar" class="progress-bar"></div>
                </div>
                <span id="uploadProgressText">0%</span>
              </div>
            </form>
          </section>
        </section>

        <section id="notificationsView" class="notifications-view hidden">
          <div class="panel-heading notification-heading">
            <div>
              <h2>Notifications</h2>
              <p>Mirrored from your Android devices</p>
            </div>
            <button id="clearNotificationsButton" class="secondary compact" type="button">Clear all</button>
          </div>
          <div id="notificationList" class="notification-list" aria-live="polite"></div>
        </section>
      </section>

      <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
